<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>무한의 계단 미니게임</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* 스크롤바 숨김 */
        }

        #game-container {
            position: relative;
            width: 400px;
            height: 600px;
            background-color: #87CEEB; /* 하늘색 배경 */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            overflow: hidden;
        }

        canvas {
            display: block;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* 클릭 이벤트 무시 */
        }

        #score-display {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            font-size: 48px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        #timer-container {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 15px;
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid white;
        }

        #timer-bar {
            width: 100%;
            height: 100%;
            background-color: #FF4136; /* 빨간색 타이머 바 */
            transition: width 0.1s linear;
        }

        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            z-index: 20;
        }

        #game-over-screen.visible {
            opacity: 1;
            pointer-events: auto;
        }

        #game-over-screen h1 {
            font-size: 48px;
            margin-bottom: 10px;
            color: #FF4136;
            text-shadow: 2px 2px 0px white;
        }

        #final-score {
            font-size: 24px;
            margin-bottom: 30px;
        }

        #restart-btn {
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            background-color: #FFDC00;
            color: #111;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: transform 0.1s, background-color 0.2s;
        }

        #restart-btn:hover {
            background-color: #FFC300;
            transform: translateY(-2px);
        }

        #restart-btn:active {
            transform: translateY(2px);
        }

        /* 터치 컨트롤 패드 (모바일 대응) */
        #touch-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 150px;
            display: flex;
            pointer-events: auto;
            z-index: 5;
        }

        .touch-zone {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            color: rgba(255, 255, 255, 0.3);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        .touch-zone:active {
             background-color: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    
    <div id="ui-layer">
        <div id="score-display">0</div>
        <div id="timer-container">
            <div id="timer-bar"></div>
        </div>
        
        <div id="touch-controls">
            <div id="btn-left" class="touch-zone">←</div>
            <div id="btn-right" class="touch-zone">→</div>
        </div>
    </div>

    <div id="game-over-screen">
        <h1>Game Over</h1>
        <div id="final-score">Score: 0</div>
        <button id="restart-btn">다시 하기</button>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreDisplay = document.getElementById('score-display');
const timerBar = document.getElementById('timer-bar');
const gameOverScreen = document.getElementById('game-over-screen');
const finalScoreDisplay = document.getElementById('final-score');
const restartBtn = document.getElementById('restart-btn');

// 게임 상수 설정
const CANVAS_WIDTH = 400;
const CANVAS_HEIGHT = 600;
const STAIR_WIDTH = 80;
const STAIR_HEIGHT = 20;
const PLAYER_SIZE = 30;

// 위치 조정을 위한 상수
// 화면 중앙 하단에서 시작하도록 설정
const START_X = CANVAS_WIDTH / 2;
const START_Y = CANVAS_HEIGHT - 150; 
// 계단 하나를 올라갈 때 이동하는 X, Y 거리
const STEP_X = 60; 
const STEP_Y = 45;

// 게임 상태 변수
let stairs = []; // 생성된 계단들을 저장하는 배열
let score = 0;
let isGameOver = false;
let maxTime = 100;
let currentTime = 100;
let timeDecreaseRate = 0.5; // 시간에 따라 감소하는 속도를 증가시킬 수 있음
let animationId;
let isFalling = false; // 캐릭터 추락 상태

// 플레이어 객체
const player = {
    x: 0,
    y: 0,
    color: '#0074D9', // 파란색 정사각형
    targetX: 0,
    targetY: 0,
    fallSpeedY: 0,
    fallSpeedX: 0,
    rotation: 0
};

// 카메라 오프셋 (스크롤 효과를 위해)
let cameraOffsetY = 0;
let targetCameraOffsetY = 0;

// 방향 상수
const LEFT = -1;
const RIGHT = 1;

// [계단 생성 코드]
function initStairs() {
    stairs = [];
    // 첫 번째 계단은 시작 위치 정중앙에 배치
    stairs.push({
        x: START_X,
        y: START_Y,
        direction: 0 // 0은 시작 위치 (방향 없음)
    });

    // 화면을 채울 만큼 충분한 계단을 미리 생성 (약 20개)
    for (let i = 1; i < 20; i++) {
        generateNextStair();
    }
}

function generateNextStair() {
    // 가장 최근에 만들어진 계단을 가져옴
    const lastStair = stairs[stairs.length - 1];
    
    // 다음 계단의 방향을 무작위로 결정 (왼쪽: -1, 오른쪽: 1)
    // Math.random() < 0.5가 참이면 LEFT(-1), 거짓이면 RIGHT(1)
    const nextDir = Math.random() < 0.5 ? LEFT : RIGHT;
    
    // 새 계단의 좌표 계산
    // 이전 계단의 X좌표에서 방향(nextDir) * STEP_X 만큼 이동
    let newX = lastStair.x + (nextDir * STEP_X);
    // Y좌표는 위로 올라가야 하므로 이전 계단의 Y좌표에서 STEP_Y 만큼 뺌
    let newY = lastStair.y - STEP_Y;

    // 만약 새 계단이 화면 바깥(왼쪽 끝이나 오른쪽 끝)으로 나간다면,
    // 강제로 반대 방향으로 꺾어줌 (지그재그 유지)
    if (newX < STAIR_WIDTH / 2 || newX > CANVAS_WIDTH - STAIR_WIDTH / 2) {
        // 방향을 반대로 바꿈
        const forceDir = -nextDir; 
        newX = lastStair.x + (forceDir * STEP_X);
        stairs.push({ x: newX, y: newY, direction: forceDir });
    } else {
        stairs.push({ x: newX, y: newY, direction: nextDir });
    }
}

function initGame() {
    initStairs();
    
    score = 0;
    isGameOver = false;
    isFalling = false;
    currentTime = maxTime;
    timeDecreaseRate = 0.3; // 초기 감소 속도
    
    // 카메라 위치 초기화
    cameraOffsetY = 0;
    targetCameraOffsetY = 0;

    // 플레이어를 첫 번째 계단 위치에 배치
    player.x = stairs[0].x;
    // 플레이어 바닥이 계단 윗면에 닿도록 Y 좌표 설정
    player.y = stairs[0].y - STAIR_HEIGHT/2 - PLAYER_SIZE/2; 
    player.targetX = player.x;
    player.targetY = player.y;
    player.fallSpeedY = 0;
    player.fallSpeedX = 0;
    player.rotation = 0;

    // UI 업데이트
    scoreDisplay.innerText = score;
    timerBar.style.width = '100%';
    gameOverScreen.classList.remove('visible');

    // 이전 애니메이션 중지 후 다시 시작
    if (animationId) cancelAnimationFrame(animationId);
    lastTime = performance.now();
    gameLoop();
}

function drawStairs() {
    ctx.fillStyle = '#AAAAAA'; // 회색 계단
    
    // 그림자 효과 설정
    ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
    ctx.shadowBlur = 5;
    ctx.shadowOffsetX = 2;
    ctx.shadowOffsetY = 5;

    for (let i = 0; i < stairs.length; i++) {
        const stair = stairs[i];
        // 카메라 오프셋을 더해서 화면이 스크롤되는 효과를 줌
        const drawY = stair.y + cameraOffsetY;
        
        // 화면 하단 바깥에 있는 계단은 그리지 않음 (최적화)
        if (drawY > CANVAS_HEIGHT + 100) continue;

        // 계단을 중심으로 그리기 위해 좌표 조정
        ctx.fillRect(
            stair.x - STAIR_WIDTH / 2, 
            drawY - STAIR_HEIGHT / 2, 
            STAIR_WIDTH, 
            STAIR_HEIGHT
        );
    }
    
    // 그림자 효과 초기화
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 0;
}

function drawPlayer() {
    ctx.save(); // 현재 캔버스 상태 저장
    
    // 카메라 오프셋 적용
    const drawY = player.y + cameraOffsetY;
    
    // 캐릭터 중심축으로 캔버스 원점 이동 (회전을 위해)
    ctx.translate(player.x, drawY);
    ctx.rotate(player.rotation); // 회전 각도 적용

    // 캐릭터 그리기 (원점이 중심이므로 -SIZE/2 위치부터 그립니다)
    ctx.fillStyle = player.color;
    
    // 약간의 둥근 모서리를 가진 정사각형
    ctx.lineJoin = "round";
    ctx.lineWidth = 4;
    ctx.strokeStyle = player.color;
    ctx.strokeRect(-PLAYER_SIZE / 2, -PLAYER_SIZE / 2, PLAYER_SIZE, PLAYER_SIZE);
    ctx.fillRect(-PLAYER_SIZE / 2, -PLAYER_SIZE / 2, PLAYER_SIZE, PLAYER_SIZE);
    
    // 눈 그리기 (귀엽게)
    if (!isFalling) {
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(-5, -5, 4, 0, Math.PI * 2);
        ctx.arc(5, -5, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'black';
        ctx.beginPath();
        ctx.arc(-5, -5, 2, 0, Math.PI * 2);
        ctx.arc(5, -5, 2, 0, Math.PI * 2);
        ctx.fill();
    } else {
        // 추락할 때 x 표시 눈
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-8, -8); ctx.lineTo(-2, -2);
        ctx.moveTo(-2, -8); ctx.lineTo(-8, -2);
        ctx.moveTo(2, -8); ctx.lineTo(8, -2);
        ctx.moveTo(8, -8); ctx.lineTo(2, -2);
        ctx.stroke();
    }

    ctx.restore(); // 캔버스 상태 복구
}

// [키보드 판정(충돌) 로직]
function handleInput(direction) {
    if (isGameOver || isFalling) return;

    // 현재 플레이어가 서 있는 계단의 인덱스는 현재 점수(score)와 동일합니다.
    // 첫 시작(score=0)이면 stairs[0]에 서 있는 상태이고, 다음 목표 계단은 stairs[1]입니다.
    const currentStairIndex = score;
    const nextStair = stairs[currentStairIndex + 1];

    // 올바른 방향키를 눌렀는지 확인
    // nextStair.direction은 이 계단이 이전 계단으로부터 어느 방향으로 만들어졌는지 나타냅니다 (LEFT 또는 RIGHT).
    if (direction === nextStair.direction) {
        // [정답] 올바른 방향키를 누른 경우
        
        score++;
        scoreDisplay.innerText = score;
        
        // 타이머 회복 (최대치 초과하지 않도록)
        currentTime = Math.min(maxTime, currentTime + 5);
        
        // 난이도 증가: 점수가 오를수록 타이머 감소 속도 증가
        if (score % 10 === 0) {
            timeDecreaseRate += 0.1;
        }

        // 플레이어 목표 위치 업데이트 (다음 계단 위)
        player.targetX = nextStair.x;
        player.targetY = nextStair.y - STAIR_HEIGHT/2 - PLAYER_SIZE/2;
        
        // 카메라 오프셋 증가 (캐릭터가 올라간 만큼 화면을 내리기 위해)
        targetCameraOffsetY += STEP_Y;

        // 새로운 계단을 하나 더 생성 (무한 스크롤)
        generateNextStair();

    } else {
        // [오답] 잘못된 방향키를 누른 경우
        triggerGameOver(direction);
    }
}

function triggerGameOver(wrongDirection) {
    isGameOver = true;
    isFalling = true;
    
    // 잘못 누른 방향으로 캐릭터가 떨어지도록 초기 속도 설정
    // 타이머 아웃인 경우 wrongDirection은 0
    let fallDir = wrongDirection !== 0 ? wrongDirection : (Math.random() < 0.5 ? -1 : 1);
    
    player.fallSpeedX = fallDir * 3;
    player.fallSpeedY = -5; // 살짝 위로 튀어올랐다가 떨어짐
    
    // UI 표시
    setTimeout(() => {
        finalScoreDisplay.innerText = `Score: ${score}`;
        gameOverScreen.classList.add('visible');
    }, 1000); // 1초 뒤 게임오버 화면 표시
}

let lastTime = 0;

function gameLoop(timestamp) {
    // 델타 타임 계산 (부드러운 움직임을 위해)
    const deltaTime = timestamp - lastTime;
    lastTime = timestamp;

    ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

    // 1. 상태 업데이트 로직
    if (!isGameOver && !isFalling) {
        // 타이머 감소 로직
        currentTime -= timeDecreaseRate;
        if (currentTime <= 0) {
            currentTime = 0;
            triggerGameOver(0); // 시간 초과로 인한 게임 오버
        }
        timerBar.style.width = `${(currentTime / maxTime) * 100}%`;

        // 부드러운 플레이어 이동 (보간)
        player.x += (player.targetX - player.x) * 0.3;
        player.y += (player.targetY - player.y) * 0.3;

        // 부드러운 카메라 스크롤 (보간)
        cameraOffsetY += (targetCameraOffsetY - cameraOffsetY) * 0.1;

    } else if (isFalling) {
        // 추락 애니메이션 로직
        player.fallSpeedY += 0.5; // 중력 적용
        player.x += player.fallSpeedX;
        player.y += player.fallSpeedY;
        player.rotation += 0.1; // 빙글빙글 회전
    }

    // 2. 그리기 로직
    drawStairs();
    drawPlayer();

    // 루프 계속
    animationId = requestAnimationFrame(gameLoop);
}

// 키보드 이벤트
document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') {
        handleInput(LEFT);
    } else if (e.key === 'ArrowRight') {
        handleInput(RIGHT);
    }
});

// 화면 터치/클릭 이벤트 (모바일 지원)
document.getElementById('btn-left').addEventListener('touchstart', (e) => {
    e.preventDefault();
    handleInput(LEFT);
});
document.getElementById('btn-right').addEventListener('touchstart', (e) => {
    e.preventDefault();
    handleInput(RIGHT);
});

// 마우스 클릭도 지원
document.getElementById('btn-left').addEventListener('mousedown', () => handleInput(LEFT));
document.getElementById('btn-right').addEventListener('mousedown', () => handleInput(RIGHT));

// 다시 시작 버튼
restartBtn.addEventListener('click', initGame);

// 게임 최초 시작
initGame();

</script>
</body>
</html>
